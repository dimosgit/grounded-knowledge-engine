name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Oldest supported (engines: >=22.5) and recommended Node versions.
        node: [22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the gitleaks secret scan can inspect every commit.
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - run: npm ci

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Isolated retrieval quality gate (BM25 + SQLite)
        run: npm run test:retrieval

      - name: Configure shared MCP server adapters
        run: npm run setup:mcp -- --skip-smoke

      - name: MCP smoke test (grounding loop)
        run: npm run smoke:mcp

      - name: MCP catalog contract (profiles, schemas, annotations, budget)
        run: npm run test:mcp:catalog

      - name: Project Context contract (strict resolution, isolation, resource parity)
        run: npm run test:projects

      - name: Loop integration test (ground -> capture -> re-ground -> cite)
        run: npm run test:loop

      - name: Ingestion unit tests
        run: npm run test:ingest:unit

      - name: Ingestion integration test (PDF/DOCX/XLSX -> grounded & cited)
        run: npm run test:ingest

      - name: Sanitization gate (strings + filenames + gitleaks)
        run: npm run scrub

  cockpit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cockpit
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/cockpit/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
